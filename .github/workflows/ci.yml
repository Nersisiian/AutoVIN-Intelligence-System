name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Generate dummy ML model for tests
        run: |
          python -c "
          import joblib
          import pandas as pd
          from sklearn.ensemble import RandomForestClassifier
          from sklearn.preprocessing import LabelEncoder
          import os
          os.makedirs('backend/app/ml', exist_ok=True)
          models = {}
          encoders = {}
          for target in ['trim', 'engine', 'transmission', 'vehicle_class']:
              le = LabelEncoder()
              le.fit(['Base', 'SE', 'Limited'])  # dummy classes
              encoders[target] = le
              model = RandomForestClassifier(n_estimators=10)
              model.fit([[0], [1], [2]], le.transform(['Base', 'SE', 'Limited']))
              models[target] = model
          joblib.dump({'models': models, 'encoders': encoders, 'feature_columns': ['wmi_A', 'vds_B']}, 'backend/app/ml/vin_model.pkl')
          "
      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          PYTHONPATH: backend
        run: pytest backend/tests/
