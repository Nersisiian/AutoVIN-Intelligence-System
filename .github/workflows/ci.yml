name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -e backend/
          pip install pytest pytest-asyncio httpx
      - name: Debug installed packages
        run: pip list | grep -E "autovin|fastapi|sqlalchemy"
      - name: Create dummy ML model
        run: |
          python -c "
          import joblib, os
          from sklearn.ensemble import RandomForestClassifier
          from sklearn.preprocessing import LabelEncoder
          os.makedirs('backend/app/ml', exist_ok=True)
          models, encoders = {}, {}
          for target in ['trim', 'engine', 'transmission', 'vehicle_class']:
              le = LabelEncoder()
              le.fit(['dummy'])
              encoders[target] = le
              model = RandomForestClassifier(n_estimators=1)
              model.fit([[0]], [0])
              models[target] = model
          joblib.dump({'models': models, 'encoders': encoders, 'feature_columns': ['wmi_dummy']}, 'backend/app/ml/vin_model.pkl')
          "
      - name: Create database tables
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
        run: |
          python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from app.models import Base
          async def init_db():
              engine = create_async_engine('postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db')
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()
          asyncio.run(init_db())
          "
      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
        run: pytest backend/tests/ -v
